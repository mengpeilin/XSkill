base_dev_dir: /data/peilin/xskill

hydra:
  run:
    dir: '${base_dev_dir}/experiment/pretrain_pick_mug/${now:%Y-%m-%d_%H-%M-%S}'

task_name: pick_red_mug

wandb:
  project: 'xskill_realworld_skill_discovery_${task_name}'
  group: '${task_name}_manual'
  job_type: skill_discovery
  run_name: null
  tags: ['realworld', 'skill_discovery', '${task_name}']

batch_size: 20
num_workers: 12
pin_memory: True
persistent_workers: True
drop_last: True
prefetch_factor: 4
matmul_precision: high
allow_tf32: True
compile_model: True
compile_mode: reduce-overhead

resize_shape: [160, 120]
repeat_shorter_dataset: True

robot_dataset:
  _target_: xskill.dataset.real_world_pretrain_dataset.RealWorldEpisodeTrajDataset
  dataset_paths:
    - '${base_dev_dir}/data/processed/pick_red_mug/robot.zarr'
  mask: null
  camera_view: cam1
  frame_sampler:
    _target_: xskill.dataset.frame_samplers.ZarrFrequencyUniformSampler
    offset: 0
    num_frames: 100
    frequency: 3
  slide: 8
  max_get_threads: 6
  resize_shape: ${resize_shape}

human_dataset:
  _target_: xskill.dataset.real_world_pretrain_dataset.RealWorldEpisodeTrajDataset
  dataset_paths:
    - '${base_dev_dir}/data/processed/pick_red_mug/human.zarr'
  mask: null
  camera_view: cam1
  frame_sampler:
    _target_: xskill.dataset.frame_samplers.ZarrFrequencyUniformSampler
    offset: 0
    num_frames: ${robot_dataset.frame_sampler.num_frames}
    frequency: ${robot_dataset.frame_sampler.frequency}
  slide: ${robot_dataset.slide}
  max_get_threads: ${robot_dataset.max_get_threads}
  resize_shape: ${resize_shape}

augmentations: ['random_crop_110_146', 'grayscale', 'gaussian_blur', 'normalize']

Trainer:
  accelerator: gpu
  devices: [0]
  max_epochs: 500
  enable_progress_bar: False
  log_every_n_steps: 100
  precision: bf16-mixed

n_layer: 8

Model:
  _target_: xskill.model.core.Model
  dim: 32
  T: 0.1
  clutser_T: ${Model.T}
  epsilon: 0.03
  stack_frames: 1
  sinkhorn_iterations: 3
  slide: ${robot_dataset.slide}
  freeze_prototypes_epoch: 0
  n_negative_samples: 16
  reverse_augment: False
  time_augment: True
  swav_loss_coef: 0.5
  cluster_loss_coef: 1
  compile_model: ${compile_model}
  compile_mode: ${compile_mode}
  lr: 1e-4
  skill_prior_encoder: null
  use_lr_scheduler: False
  use_temperature_scheduler: False
  positive_window: 6
  negative_window: 18
  skill_prior:
    _target_: xskill.model.encoder.VisualMotionPrior
    out_size: 128
    vision_only: True
    vision_encoder:
      _target_: xskill.model.encoder.CNN_v3
      out_size: ${Model.skill_prior.out_size}
    nmb_prototypes: ${Model.dim}
    normalize: False
  encoder_q:
    _target_: xskill.model.encoder.VisualMotionEncoder
    vision_only: True
    state_size: 256
    out_size: 256
    vision_encoder:
      _target_: xskill.model.encoder.CNN_v3
      out_size: ${Model.encoder_q.state_size}
    nmb_prototypes: ${Model.dim}
    normalize: True
    start_end: True
    goal_condition: False
    temporal_transformer_encoder:
      _target_: xskill.model.transformer.TorchTransformerEncoder
      query_dim: ${Model.encoder_q.state_size}
      heads: 4
      dim_feedforward: 512
      n_layer: ${n_layer}
      rep_dim: ${Model.encoder_q.out_size}
      use_encoder: False
      input_dim: null
      pos_encoder:
        _target_: xskill.model.transformer.PositionalEncoding
        size: ${Model.encoder_q.state_size}
        max_len: 10
        frequency: 10

callback:
  every_n_epoch: 10
