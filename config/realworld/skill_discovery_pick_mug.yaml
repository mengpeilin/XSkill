base_dev_dir: /data/peilin/xskill

hydra:
  run:
    dir: '${base_dev_dir}/experiment/pretrain_pick_mug/${now:%Y-%m-%d_%H-%M-%S}'

seed: 45
repeat_shorter_dataset: True
batch_size: 64
num_workers: 4
pin_memory: False
persistent_workers: False
drop_last: True

resize_shape: [124, 124]
max_get_threads: 8

robot_dataset:
  _target_: xskill.dataset.dataset.EpisodeTrajDataset
  _allowed_dirs:
    - '${base_dev_dir}/data/processed/pick_red_mug/robot'
  vid_mask: '${base_dev_dir}/data/processed/pick_red_mug/robot_mask_40.json'
  frame_sampler:
    _target_: xskill.dataset.frame_samplers.UniformDownSampleSampler
    offset: 0
    num_frames: 50
    downsample_ratio: 1
  slide: 8
  resize_shape: ${resize_shape}
  max_get_threads: ${max_get_threads}

human_dataset:
  _target_: xskill.dataset.dataset.EpisodeTrajDataset
  _allowed_dirs:
    - '${base_dev_dir}/data/processed/pick_red_mug/human'
  vid_mask: '${base_dev_dir}/data/processed/pick_red_mug/human_mask_100.json'
  frame_sampler:
    _target_: xskill.dataset.frame_samplers.UniformDownSampleSampler
    offset: ${robot_dataset.frame_sampler.offset}
    num_frames: ${robot_dataset.frame_sampler.num_frames}
    downsample_ratio: ${robot_dataset.frame_sampler.downsample_ratio}
  slide: ${robot_dataset.slide}
  resize_shape: ${resize_shape}
  max_get_threads: ${max_get_threads}

augmentations: ['random_crop_112_112', 'color_jitter', 'grayscale', 'gaussian_blur', 'normalize']

Trainer:
  accelerator: "gpu"
  devices: [0]
  max_epochs: 100
  enable_progress_bar: True
  log_every_n_steps: 10

n_layer: 8

callback:
  every_n_epoch: 10

Model:
  _target_: xskill.model.core.Model
  dim: 128
  T: 0.1
  clutser_T: ${Model.T}
  epsilon: 0.03
  stack_frames: 1
  sinkhorn_iterations: 3
  slide: ${robot_dataset.slide}
  freeze_prototypes_epoch: 0
  n_negative_samples: 16
  reverse_augment: False
  time_augment: True
  swav_loss_coef: 0.5
  cluster_loss_coef: 1
  lr: 1e-4
  skill_prior_encoder: null
  use_lr_scheduler: False
  use_temperature_scheduler: False
  positive_window: 4
  negative_window: 12

  skill_prior:
    _target_: xskill.model.encoder.VisualMotionPrior
    out_size: 128
    vision_only: True
    vision_encoder:
      _target_: xskill.model.encoder.CNN
      out_size: ${Model.skill_prior.out_size}

    nmb_prototypes: ${Model.dim}
    normalize: False

  encoder_q:
    _target_: xskill.model.encoder.VisualMotionEncoder
    vision_only: True
    state_size: 256
    out_size: 256
    vision_encoder:
      _target_: xskill.model.encoder.CNN
      out_size: ${Model.encoder_q.state_size}

    nmb_prototypes: ${Model.dim}
    normalize: True
    start_end: True
    goal_condition: False

    temporal_transformer_encoder:
      _target_: xskill.model.transformer.TorchTransformerEncoder
      query_dim: ${Model.encoder_q.state_size}
      heads: 4
      dim_feedforward: 512
      n_layer: ${n_layer}
      rep_dim: ${Model.encoder_q.out_size}
      use_encoder: False
      input_dim: null
      pos_encoder:
        _target_: xskill.model.transformer.PositionalEncoding
        size: ${Model.encoder_q.state_size}
        max_len: 10
        frequency: 10
